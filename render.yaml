services:
  - type: web
    name: distillerp-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python render_start.py && uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: distillerp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://distillerp.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: BACKUP_PATH
        value: /tmp/distillerp-backups
      - key: INITIAL_SUPERADMIN_EMAIL
        value: superadmin@distillerp.com
      - key: INITIAL_SUPERADMIN_PASSWORD
        sync: false
      - key: INITIAL_SUPERADMIN_NAME
        value: Test Super Admin

databases:
  - name: distillerp-db
    plan: free
    databaseName: distillerp
    user: distillerp
